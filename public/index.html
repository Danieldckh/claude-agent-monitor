<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Agent Monitor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="header">
    <div class="header-left">
      <h1>Claude Monitor</h1>
      <span id="connection-status" class="status-dot disconnected"></span>
      <span id="connection-label">Disconnected</span>
    </div>
    <div class="header-right">
      <span id="stat-sessions">0</span> sessions
      <span class="header-sep">|</span>
      <span id="stat-agents">0</span> agents
      <span class="header-sep">|</span>
      <span id="stat-tokens">0</span> tokens
    </div>
  </header>

  <div id="usage-bar">
    <div class="usage-track">
      <span class="usage-label">5h</span>
      <div class="usage-progress">
        <div class="usage-fill" id="usage-5h-fill" style="width: 0%"></div>
      </div>
      <span class="usage-value" id="usage-5h-value">0%</span>
    </div>
    <div class="usage-track">
      <span class="usage-label">7d</span>
      <div class="usage-progress">
        <div class="usage-fill weekly" id="usage-weekly-fill" style="width: 0%"></div>
      </div>
      <span class="usage-value" id="usage-weekly-value">0%</span>
    </div>
  </div>

  <div id="tree-toolbar">
    <span id="active-session-label">No active sessions</span>
    <div class="toolbar-actions">
      <button id="expand-all-btn" title="Expand all">+</button>
      <button id="collapse-all-btn" title="Collapse all">-</button>
    </div>
  </div>

  <main id="agent-tree"></main>

  <script src="app.js"></script>
</body>
</html>
