<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Agent Monitor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="header">
    <div class="header-left">
      <h1>Claude Monitor</h1>
      <span id="connection-status" class="status-dot disconnected"></span>
      <span id="connection-label">Disconnected</span>
    </div>
    <div class="header-right">
      <span id="stat-sessions">0</span> sessions
      <span class="header-sep">|</span>
      <span id="stat-agents">0</span> agents
      <span class="header-sep">|</span>
      <span id="stat-tokens">0</span> tokens
    </div>
  </header>

  <div id="usage-bar">
    <div class="usage-track">
      <span class="usage-label">5h</span>
      <div class="usage-progress">
        <div class="usage-fill" id="usage-5h-fill" style="width: 0%">
          <span class="usage-pct" id="usage-5h-pct">0%</span>
        </div>
      </div>
      <span class="usage-value" id="usage-5h-value">0 sess</span>
    </div>
    <div class="usage-track">
      <span class="usage-label">7d</span>
      <div class="usage-progress">
        <div class="usage-fill weekly" id="usage-weekly-fill" style="width: 0%">
          <span class="usage-pct" id="usage-weekly-pct">0%</span>
        </div>
      </div>
      <span class="usage-value" id="usage-weekly-value">0 sess</span>
    </div>
  </div>

  <div id="main-layout">
    <div id="session-timeline">
      <div class="timeline-header">
        <span id="timeline-session-label">No session selected</span>
        <label class="auto-scroll-toggle">
          <input type="checkbox" id="auto-scroll-check" checked>
          Auto-scroll
        </label>
      </div>
      <div id="timeline-entries"></div>
    </div>
    <aside id="session-history">
      <div class="history-header">Sessions</div>
      <div id="history-cards"></div>
    </aside>
  </div>

  <script src="app.js"></script>
</body>
</html>
