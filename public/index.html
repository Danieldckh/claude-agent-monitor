<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Agent Monitor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="header">
    <div class="header-left">
      <h1>Claude Monitor</h1>
      <span id="connection-status" class="status-dot disconnected"></span>
      <span id="connection-label">Disconnected</span>
    </div>
    <div class="header-right">
      <span id="stat-sessions">0</span> sessions
      <span class="sep">|</span>
      <span id="stat-agents">0</span> agents
      <span class="sep">|</span>
      <span id="stat-input-tokens">0</span> in
      <span class="sep">/</span>
      <span id="stat-output-tokens">0</span> out
    </div>
  </header>

  <div id="main-layout">
    <div id="transcript-panel">
      <div class="panel-header">
        <span id="panel-session-label">No session selected</span>
        <div class="panel-controls">
          <label class="filter-label">
            <select id="filter-type">
              <option value="all">All</option>
              <option value="thinking">Thinking</option>
              <option value="text">Text</option>
              <option value="tool_use">Tool calls</option>
              <option value="tool_result">Results</option>
              <option value="user">User</option>
              <option value="agent_prompt">Agent prompts</option>
            </select>
          </label>
          <label class="filter-label">
            <select id="filter-agent">
              <option value="all">All agents</option>
            </select>
          </label>
          <label class="auto-scroll-toggle">
            <input type="checkbox" id="auto-scroll-check" checked> Live
          </label>
        </div>
      </div>
      <div id="transcript-entries"></div>
    </div>
    <aside id="session-sidebar">
      <div class="sidebar-header">Sessions</div>
      <div id="session-cards"></div>
    </aside>
  </div>

  <script src="app.js"></script>
</body>
</html>
