<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Agent Monitor</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <header id="header">
    <div class="header-left">
      <h1>Claude Monitor</h1>
      <span id="connection-status" class="status-dot disconnected"></span>
      <span id="connection-label">Disconnected</span>
    </div>
    <div class="header-right">
      <span id="active-session-label">No active session</span>
    </div>
  </header>

  <main id="main">
    <section id="tree-panel">
      <div class="panel-header">
        <h2>Live Agent Tree</h2>
        <div class="panel-header-actions">
          <button id="collapse-all-btn" title="Collapse all">-</button>
          <button id="expand-all-btn" title="Expand all">+</button>
        </div>
      </div>
      <div id="agent-tree"></div>
    </section>

    <section id="usage-panel">
      <div class="panel-header">
        <h2>Usage</h2>
      </div>
      <div class="chart-container">
        <h3>5-Hour Rolling Window</h3>
        <canvas id="chart-5h"></canvas>
      </div>
      <div class="chart-container">
        <h3>Weekly Overview</h3>
        <canvas id="chart-weekly"></canvas>
      </div>
      <div id="stats-card">
        <h3>Today</h3>
        <div class="stat-row">
          <span class="stat-label">Sessions</span>
          <span class="stat-value" id="stat-sessions">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Avg Duration</span>
          <span class="stat-value" id="stat-duration">0m</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Est. Tokens 24h</span>
          <span class="stat-value" id="stat-tokens">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Agents Spawned</span>
          <span class="stat-value" id="stat-agents">0</span>
        </div>
      </div>
    </section>
  </main>

  <div id="detail-panel">
    <div class="panel-header">
      <h2 id="detail-title">Agent Detail</h2>
      <div class="panel-header-actions">
        <button id="detail-close-btn" title="Minimize">_</button>
      </div>
    </div>
    <div id="detail-content">
      <p class="empty-state">Select an agent node to view details</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
